# ==========================================================================
# LOCAL profile – developer machine against local PostgreSQL.
# Run: SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run   (default profile)
# Requires a running Postgres; use the `dev-h2` profile if you don't have one.
# ==========================================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transitops}
    username: ${DB_USERNAME:transitops}
    password: ${DB_PASSWORD:team@101}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Auto-create/update schema locally for fast iteration.
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.transitops: DEBUG
    org.springframework.security: INFO
