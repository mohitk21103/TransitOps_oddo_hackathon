# ==========================================================================
# LOCAL profile – developer's own machine against a local PostgreSQL.
# Run: SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run
# Flyway owns the schema (V1__init.sql); Hibernate never mutates it.
# ==========================================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://72.60.205.221:5432/transitops}
    username: ${DB_USERNAME:transitops}
    password: ${DB_PASSWORD:team@101}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none          # schema is managed by Flyway
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

logging:
  level:
    com.transitops: DEBUG
    org.springframework.security: INFO
