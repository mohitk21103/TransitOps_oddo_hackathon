# ==========================================================================
# DEV-H2 profile – zero-dependency in-memory DB for quick auth demos / CI.
# The Postgres-specific migration (enums, generated columns, partial indexes)
# is NOT applied here; Hibernate creates just the auth tables, and the
# DataInitializer seeds roles + the admin user.
# Run: SPRING_PROFILES_ACTIVE=dev-h2 ./mvnw spring-boot:run
# ==========================================================================
spring:
  datasource:
    url: jdbc:h2:mem:transitops;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
