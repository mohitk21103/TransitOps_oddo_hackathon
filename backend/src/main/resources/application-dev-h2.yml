# ==========================================================================
# DEV-H2 profile – zero-dependency in-memory DB so the app boots without
# PostgreSQL. Handy for the hackathon demo / CI smoke tests.
# Run: SPRING_PROFILES_ACTIVE=dev-h2 ./mvnw spring-boot:run
# H2 console: http://localhost:4000/h2-console  (JDBC URL: jdbc:h2:mem:transitops)
# ==========================================================================
spring:
  datasource:
    url: jdbc:h2:mem:transitops;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
