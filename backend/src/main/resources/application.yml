# ==========================================================================
# TransitOps – base configuration (shared by all profiles)
# Active profile is chosen via SPRING_PROFILES_ACTIVE (defaults to "local").
# Every secret/host is overridable by an environment variable so the same
# jar runs unchanged in local and production.
# ==========================================================================
spring:
  application:
    name: transitops
  profiles:
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:4000}

# ---- Application-specific settings -----------------------------------------
transitops:
  security:
    jwt:
      # HS256 secret – MUST be overridden in production via JWT_SECRET.
      secret: ${JWT_SECRET:change-me-in-prod-a-very-long-dev-only-secret-key-1234567890}
      # Access-token lifetime in milliseconds (default 1h).
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      issuer: ${JWT_ISSUER:transitops}
    cors:
      # Comma-separated list of allowed frontend origins.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
