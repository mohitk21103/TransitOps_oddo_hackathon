# ==========================================================================
# TransitOps – base configuration (shared by ALL profiles).
# Choose an environment with SPRING_PROFILES_ACTIVE (defaults to "dev"):
#   dev     -> shared team PostgreSQL (72.60.205.221)  [runs out of the box]
#   local   -> your own localhost PostgreSQL
#   prod    -> production; every value from environment variables
#   dev-h2  -> in-memory H2, no database needed
# Every secret/host is env-overridable so the same jar runs unchanged anywhere.
# ==========================================================================
spring:
  application:
    name: transitops
  profiles:
    default: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:4000}

# ---- Application-specific settings -----------------------------------------
transitops:
  security:
    jwt:
      # HS256 secret – MUST be overridden in production via JWT_SECRET.
      secret: ${JWT_SECRET:change-me-in-prod-a-very-long-dev-only-secret-key-1234567890}
      # Access-token lifetime in milliseconds (default 1h).
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      issuer: ${JWT_ISSUER:transitops}
    cors:
      # Comma-separated list of allowed frontend origins.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
