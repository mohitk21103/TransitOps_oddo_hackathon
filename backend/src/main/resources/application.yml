# ==========================================================================
# TransitOps – base configuration (shared by ALL profiles).
# Choose an environment with SPRING_PROFILES_ACTIVE (defaults to "dev"):
#   dev     -> shared team PostgreSQL (72.60.205.221)  [runs out of the box]
#   local   -> your own localhost PostgreSQL
#   prod    -> production; every value from environment variables
#   dev-h2  -> in-memory H2, no database needed
# Every secret/host is env-overridable so the same jar runs unchanged anywhere.
# ==========================================================================
spring:
  application:
    name: transitops
  profiles:
    default: dev
  # ---- Connection pool (HikariCP) — shared defaults, all env-overridable ----
  datasource:
    hikari:
      pool-name: TransitOpsPool
      maximum-pool-size: ${DB_POOL_MAX:10}      # hard ceiling on concurrent DB connections
      minimum-idle: ${DB_POOL_MIN:2}            # warm connections kept ready
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}   # wait max 30s for a connection
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}              # retire idle conns after 10m
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}             # recycle conns before 30m (< DB timeout)
      keepalive-time: ${DB_KEEPALIVE_MS:300000}               # ping idle conns every 5m
      leak-detection-threshold: ${DB_LEAK_DETECTION_MS:30000} # warn if a conn is held > 30s
  jpa:
    open-in-view: false           # no lazy loading outside the service layer
    show-sql: false               # never print SQL to the console
    properties:
      hibernate:
        jdbc:
          batch_size: 30          # batch inserts/updates for throughput
        order_inserts: true
        order_updates: true

server:
  port: ${SERVER_PORT:9095}

# ---- Application-specific settings -----------------------------------------
transitops:
  security:
    jwt:
      # HS256 secret – MUST be overridden in production via JWT_SECRET.
      secret: ${JWT_SECRET:change-me-in-prod-a-very-long-dev-only-secret-key-1234567890}
      # Access-token lifetime in milliseconds (default 1h).
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      issuer: ${JWT_ISSUER:transitops}
    cors:
      # Comma-separated list of allowed frontend origins.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
