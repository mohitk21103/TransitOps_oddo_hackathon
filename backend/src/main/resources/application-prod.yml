# ==========================================================================
# PRODUCTION profile – everything from environment variables.
# Run: SPRING_PROFILES_ACTIVE=prod java -jar backend.jar
# JWT_SECRET & DB_* MUST be provided. Flyway owns the schema.
# ==========================================================================
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
  jpa:
    hibernate:
      ddl-auto: none          # schema is managed by Flyway migrations
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

logging:
  level:
    root: INFO
    com.transitops: INFO
